<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elementyl Intelligence — Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F6F9F7;
    --panel:     #EAF3EE;
    --border:    #D2E3DA;
    --ink:       #163832;
    --blue:      #2C7DA0;
    --green:     #4F9B72;
    --on-accent: #FFFFFF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
  }

  h1, h2, h3, .display {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
  }

  button {
    font-family: inherit;
  }

  /* ---------- App shell ---------- */

  .app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100vh;
    height: 100dvh;
  }

  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .chat-panel {
    background: var(--bg);
    border-right: 1px solid var(--border);
  }

  .form-panel {
    background: var(--panel);
  }

  .panel-header {
    padding: 24px 28px 16px;
    flex-shrink: 0;
  }

  .panel-header h1 {
    font-size: 28px;
    margin: 0 0 4px;
    color: var(--ink);
  }

  .panel-header p {
    margin: 0;
    font-size: 13px;
    color: var(--green);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.9;
  }

  /* ---------- Chat panel ---------- */

  .chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 8px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.45;
    opacity: 0;
    transform: translateY(6px);
  }

  @media (prefers-reduced-motion: no-preference) {
    .bubble.enter, .chip-row.enter {
      animation: bubbleIn 0.35s ease forwards;
    }
    @keyframes bubbleIn {
      to { opacity: 1; transform: translateY(0); }
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .bubble, .chip-row { opacity: 1; transform: none; }
  }

  .bubble.bot {
    align-self: flex-start;
    background: var(--panel);
    color: var(--ink);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .bubble.user {
    align-self: flex-end;
    background: var(--blue);
    color: var(--on-accent);
    border-bottom-right-radius: 4px;
  }

  .typing {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px 18px;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 4px;
    width: fit-content;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    opacity: 0.7;
  }

  @media (prefers-reduced-motion: no-preference) {
    .typing span {
      animation: typingBounce 1.1s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
  }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-self: flex-start;
    max-width: 82%;
    opacity: 0;
    transform: translateY(6px);
  }

  .chip {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--blue);
    background: var(--bg);
    color: var(--blue);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .chip:hover:not(:disabled) {
    background: var(--blue);
    color: var(--on-accent);
  }

  .chip:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* ---------- Chat input ---------- */

  .chat-input-row {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 28px;
    border-top: 1px solid var(--border);
  }

  .chat-input-row input[type="text"] {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 18px;
    color: var(--ink);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .chat-input-row input[type="text"]:focus {
    border-color: var(--blue);
  }

  .chat-input-row input[type="text"]:disabled {
    opacity: 0.5;
  }

  .icon-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }

  .icon-btn:hover:not(:disabled) {
    border-color: var(--blue);
  }

  .icon-btn:active:not(:disabled) {
    transform: scale(0.94);
  }

  .icon-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .send-btn {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--on-accent);
  }

  .mic-btn.listening {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--on-accent);
  }

  @media (prefers-reduced-motion: no-preference) {
    .mic-btn.listening {
      animation: micPulse 1.2s ease-in-out infinite;
    }
    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(44, 125, 160, 0.45); }
      50% { box-shadow: 0 0 0 8px rgba(44, 125, 160, 0); }
    }
  }

  .mic-btn.unsupported {
    display: none;
  }

  .mic-btn svg, .send-btn svg, .wake-btn svg {
    width: 18px;
    height: 18px;
  }

  .wake-btn.active {
    border-color: var(--green);
    color: var(--green);
  }

  .wake-btn.armed {
    background: var(--green);
    border-color: var(--green);
    color: var(--on-accent);
  }

  @media (prefers-reduced-motion: no-preference) {
    .wake-btn.armed {
      animation: wakePulse 1.2s ease-in-out infinite;
    }
    @keyframes wakePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(79, 155, 114, 0.5); }
      50% { box-shadow: 0 0 0 8px rgba(79, 155, 114, 0); }
    }
  }

  .wake-btn.unsupported {
    display: none;
  }

  /* ---------- Form panel ---------- */

  .form-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 28px 28px;
  }

  .progress-track {
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    overflow: hidden;
    margin: 0 28px 4px;
    flex-shrink: 0;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--blue);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .completion-badge {
    margin: 0 28px 16px;
    padding: 10px 16px;
    background: rgba(79, 155, 114, 0.12);
    border: 1px solid var(--green);
    border-radius: 10px;
    color: var(--green);
    font-size: 14px;
    display: none;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .completion-badge.show {
    display: flex;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--green);
    opacity: 0.9;
    margin-bottom: 6px;
  }

  .form-field {
    display: block;
    width: 100%;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--ink);
    min-height: 20px;
    transition: border-color 0.3s ease, background 0.3s ease;
    outline: none;
  }

  .form-field:focus {
    border-color: var(--blue);
  }

  .form-field::placeholder {
    color: rgba(22, 56, 50, 0.4);
    font-style: italic;
    opacity: 1;
  }

  .form-field.filled {
    border-color: var(--blue);
    background: rgba(44, 125, 160, 0.06);
  }

  @media (prefers-reduced-motion: no-preference) {
    .form-field.flash {
      animation: fieldFlash 0.6s ease;
    }
    @keyframes fieldFlash {
      0% { background: rgba(79, 155, 114, 0.3); }
      100% { background: rgba(44, 125, 160, 0.06); }
    }
  }

  /* ---------- Mobile tab bar ---------- */

  .tab-bar {
    display: none;
  }

  /* ================= MOBILE ================= */

  @media (max-width: 767px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .panel {
      grid-column: 1;
      grid-row: 1;
      padding-bottom: 72px;
    }

    .panel.hidden {
      display: none;
    }

    .chat-panel {
      border-right: none;
    }

    .tab-bar {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      z-index: 10;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--ink);
      opacity: 0.55;
      font-size: 13px;
      cursor: pointer;
      position: relative;
      border-top: 2px solid transparent;
    }

    .tab-btn.active {
      opacity: 1;
      border-top-color: var(--blue);
      color: var(--blue);
    }

    .tab-badge {
      font-size: 11px;
      opacity: 0.8;
    }

    .notif-dot {
      position: absolute;
      top: 8px;
      right: calc(50% - 22px);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: none;
    }

    .notif-dot.show {
      display: block;
    }
  }
</style>
</head>
<body>

<div class="app">

  <section class="panel chat-panel" id="chatPanel">
    <div class="panel-header">
      <h1 class="display">Let's get started</h1>
      <p>Elementyl Intelligence Intake</p>
    </div>

    <div class="chat-log" id="chatLog" aria-live="polite"></div>

    <form class="chat-input-row" id="chatForm">
      <button type="button" class="icon-btn mic-btn" id="micBtn" aria-label="Toggle voice input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
      <button type="button" class="icon-btn wake-btn" id="wakeBtn" aria-label="Toggle hands-free wake-word mode" title="Hands-free: say &quot;Hey Elementyl&quot;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12a8 8 0 0 1 16 0"></path>
          <path d="M4 12v3a2 2 0 0 0 2 2h1v-6H5a1 1 0 0 0-1 1z"></path>
          <path d="M20 12v3a2 2 0 0 1-2 2h-1v-6h1a1 1 0 0 1 2 1z"></path>
        </svg>
      </button>
      <input type="text" id="chatInput" placeholder="Type your answer…" autocomplete="off" aria-label="Your answer">
      <button type="submit" class="icon-btn send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </section>

  <section class="panel form-panel" id="formPanel">
    <div class="panel-header">
      <h1 class="display">Your Intake Form</h1>
      <p id="progressLabel">0 of 8 fields complete</p>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

    <div class="completion-badge" id="completionBadge">
      <span>&#10003;</span> All set — thank you for completing your intake.
    </div>

    <div class="form-scroll">
      <div class="form-group">
        <label for="f-name">Full Name</label>
        <input type="text" class="form-field" id="f-name" data-field="name" placeholder="Waiting…">
      </div>
      <div class="form-group">
        <label for="f-address">Street Address</label>
        <input type="text" class="form-field" id="f-address" data-field="address" placeholder="Waiting…">
      </div>
      <div class="form-group">
        <label for="f-city">City, State, ZIP</label>
        <input type="text" class="form-field" id="f-city" data-field="city" placeholder="Waiting…">
      </div>
      <div class="form-group">
        <label for="f-phone">Phone Number</label>
        <input type="text" class="form-field" id="f-phone" data-field="phone" placeholder="Waiting…">
      </div>
      <div class="form-group">
        <label for="f-email">Email Address</label>
        <input type="text" class="form-field" id="f-email" data-field="email" placeholder="Waiting…">
      </div>
      <div class="form-group">
        <label for="f-business">Business Name</label>
        <input type="text" class="form-field" id="f-business" data-field="business" placeholder="Waiting…">
      </div>
      <div class="form-group">
        <label for="f-insurance">Insurance Provider</label>
        <input type="text" class="form-field" id="f-insurance" data-field="insurance" placeholder="Waiting…">
      </div>
      <div class="form-group">
        <label for="f-referral">How did you hear about us?</label>
        <input type="text" class="form-field" id="f-referral" data-field="referral" placeholder="Waiting…">
      </div>
    </div>
  </section>

</div>

<nav class="tab-bar" id="tabBar">
  <button type="button" class="tab-btn active" id="chatTab">
    <span>Chat</span>
  </button>
  <button type="button" class="tab-btn" id="formTab" style="position:relative;">
    <span class="notif-dot" id="notifDot"></span>
    <span class="tab-badge" id="formTabBadge">Form 0/8</span>
  </button>
</nav>

<script>
(function () {
  'use strict';

  var steps = [
    { field: 'name',      question: "Hi there! I'm here to get you set up. What's your full name?" },
    { field: 'address',   question: "Nice to meet you. What's your street address?" },
    { field: 'city',      question: "And the city, state, and ZIP for that address?" },
    { field: 'phone',     question: "What's the best phone number to reach you?" },
    { field: 'email',     question: "What's your email address?" },
    { field: 'business',  question: "Do you have a business name? If it's just you, feel free to say \"N/A\"." },
    { field: 'insurance', question: "What's your insurance provider?", type: 'fuzzy-select' },
    { field: 'referral',  question: "Last one — how did you hear about us?" }
  ];

  var INSURANCE_OPTIONS = [
    'Aetna',
    'Anthem Blue Cross (California)',
    'Anthem Blue Cross Blue Shield (Ohio)',
    'Blue Cross Blue Shield of Texas',
    'Blue Shield of California',
    'Cigna',
    'UnitedHealthcare',
    'Humana',
    'Kaiser Permanente',
    'Molina Healthcare',
    'Oscar Health',
    'Medicare',
    'Medicaid',
    'TRICARE',
    'Ambetter',
    'Oxford Health Plans',
    'EmblemHealth',
    'Highmark',
    'WellCare',
    'None / Self-pay'
  ];

  var INSURANCE_ALIASES = {
    'uhc': 'UnitedHealthcare',
    'united healthcare': 'UnitedHealthcare',
    'united health care': 'UnitedHealthcare',
    'kaiser': 'Kaiser Permanente',
    'medi cal': 'Medicaid',
    'medical': 'Medicaid',
    'obamacare': 'Ambetter',
    'marketplace': 'Ambetter',
    'self pay': 'None / Self-pay',
    'no insurance': 'None / Self-pay',
    'none': 'None / Self-pay',
    'na': 'None / Self-pay'
  };

  function normalizeText(s) {
    return s.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
  }

  function tokenize(s) {
    var n = normalizeText(s);
    return n ? n.split(' ') : [];
  }

  function matchInsurance(rawText) {
    var norm = normalizeText(rawText);
    if (!norm) return { status: 'none' };

    for (var i = 0; i < INSURANCE_OPTIONS.length; i++) {
      if (normalizeText(INSURANCE_OPTIONS[i]) === norm) {
        return { status: 'match', value: INSURANCE_OPTIONS[i] };
      }
    }

    if (Object.prototype.hasOwnProperty.call(INSURANCE_ALIASES, norm)) {
      return { status: 'match', value: INSURANCE_ALIASES[norm] };
    }

    var userTokens = tokenize(rawText);
    var scored = INSURANCE_OPTIONS.map(function (opt) {
      var optTokens = tokenize(opt);
      var hits = 0;
      userTokens.forEach(function (t) {
        var found = optTokens.some(function (ot) {
          return ot.indexOf(t) !== -1 || t.indexOf(ot) !== -1;
        });
        if (found) hits++;
      });
      return { option: opt, score: hits, tokenCount: optTokens.length };
    }).filter(function (s) { return s.score > 0; })
      .sort(function (a, b) { return b.score - a.score; });

    if (scored.length === 0) return { status: 'none' };

    var topScore = scored[0].score;
    var topMatches = scored.filter(function (s) { return s.score === topScore; });

    // A single brand word ("Anthem") shouldn't silently win against a much
    // longer, more specific option name ("Anthem Blue Cross Blue Shield
    // (Ohio)") just because it's the only candidate that matched at all —
    // covering 1 of 6 words is not the same confidence as covering 1 of 1.
    // Require the match to cover at least half of the option's own tokens
    // before treating it as settled; otherwise fall through to "ambiguous"
    // (which still works fine with only one candidate — it shows as a
    // single confirm-or-"something else" chip rather than an auto-accept).
    var confident = topMatches.length === 1 &&
      userTokens.length > 0 &&
      topScore >= userTokens.length &&
      topMatches[0].tokenCount <= userTokens.length * 2;

    if (confident) {
      return { status: 'match', value: topMatches[0].option };
    }

    return {
      status: 'ambiguous',
      candidates: scored.slice(0, 3).map(function (s) { return s.option; })
    };
  }

  // ---------- One-shot multi-field extraction (demo) ----------
  // Pattern-based, not an LLM (ADR-004 blocks backend/API calls). Reliable
  // for structurally distinct fields (email, phone, address, city/state/zip,
  // insurance); heuristic and occasionally wrong for free-text fields (name,
  // business, referral) since those have no reliable shape to match on.

  var FIELD_LABELS = {
    name: 'name',
    address: 'street address',
    city: 'city/state/zip',
    phone: 'phone number',
    email: 'email',
    business: 'business name',
    insurance: 'insurance provider',
    referral: 'referral source'
  };

  function buildAckMessage(fields) {
    var labels = fields.map(function (f) { return FIELD_LABELS[f] || f; });
    var joined;
    if (labels.length === 1) {
      joined = labels[0];
    } else if (labels.length === 2) {
      joined = labels[0] + ' and ' + labels[1];
    } else {
      joined = labels.slice(0, -1).join(', ') + ', and ' + labels[labels.length - 1];
    }
    var pronoun = labels.length === 1 ? "that's one thing" : 'those are ' + labels.length + ' things';
    return "Got it — I also picked up your " + joined + " from that message, so " + pronoun + " I don't need to ask about separately.";
  }

  // Catches when the user is talking ABOUT the conversation (a complaint,
  // a request to repeat, confusion) rather than answering the question.
  // Deliberately narrow and phrased around explicit meta-language ("you",
  // "already", "told", "understand", "repeat") rather than short negations
  // like "no"/"none"/"nevermind" — those are legitimate real answers on
  // fields like business name and insurance ("N/A", "none" both map to
  // real values), so a broad catch-all here would misfire on valid input.
  var CONVERSATIONAL_ASIDE_PATTERNS = [
    /\byou\s+(already\s+)?have\s+(it|that|this)\b/i,
    /\bi\s+(just\s+)?(told|said|gave|answered)\s+you\b/i,
    /what do you mean/i,
    /\b(can|could) you (repeat|say that again)\b/i,
    /\bi don'?t understand\b/i,
    /\bdidn'?t i\b/i,
    /^\s*(what|huh)\s*\?+\s*$/i
  ];

  // "already" plus a communication verb, in EITHER order — "I already told
  // you" and "I gave it to you already" both need to match, and word order
  // varies enough in casual phrasing that a single fixed-order regex missed
  // the second form during testing.
  var ALREADY_RE = /\balready\b/i;
  var COMM_VERB_RE = /\b(told|gave|said|answered|sent|provided|entered|filled|mentioned)\b/i;

  function isConversationalAside(text) {
    if (ALREADY_RE.test(text) && COMM_VERB_RE.test(text)) return true;
    return CONVERSATIONAL_ASIDE_PATTERNS.some(function (re) { return re.test(text); });
  }

  // Catches the user asking a genuine question back ("why do you need my
  // phone number?", "is this required?") rather than answering. Distinct
  // from isConversationalAside() above (which catches complaints/confusion)
  // — a question gets a different, more helpful response: a one-line reason
  // the field is asked for, then a re-ask, instead of an apology.
  var QUESTION_LEAD_RE = /^\s*(why|what|is|are|do|does|did|can|could|should|would|will|who|where|when|how)\b/i;
  var QUESTION_MARK_RE = /\?\s*$/;

  function isLikelyQuestion(text) {
    return QUESTION_MARK_RE.test(text) || QUESTION_LEAD_RE.test(text);
  }

  // Short, honest reasons for each field — used only when a question is
  // detected on that field's turn. Keep these brief and true; this is a
  // demo, not a place to oversell why the data is needed.
  var FIELD_WHY = {
    name: "just so we know who we're talking to",
    address: 'so we can mail anything you might need',
    city: 'same as your street address — just for mailing',
    phone: 'in case we need to reach you quickly',
    email: 'so we can follow up with next steps',
    business: "totally optional — leave it blank or say \"N/A\" if it's just you",
    insurance: 'so we can check what your plan covers before your visit',
    referral: 'just so we know what\'s working for us'
  };

  var REFERRAL_KEYWORDS = [
    { re: /google/i, label: 'Google search' },
    { re: /facebook/i, label: 'Facebook' },
    { re: /instagram/i, label: 'Instagram' },
    { re: /linkedin/i, label: 'LinkedIn' },
    { re: /tiktok/i, label: 'TikTok' },
    { re: /twitter|\bx\.com\b/i, label: 'Twitter/X' },
    { re: /word of mouth|referr(?:al|ed)|\bfriend\b/i, label: 'Friend referral' },
    { re: /event|conference|expo/i, label: 'Event/conference' },
    { re: /podcast/i, label: 'Podcast' },
    { re: /\bad\b|advertisement|commercial/i, label: 'Advertisement' },
    { re: /yelp/i, label: 'Yelp' },
    { re: /search engine|searched|searching/i, label: 'Search engine' }
  ];

  var EMAIL_RE = /[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/i;
  var PHONE_RE = /(\+?1[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}\b/;
  var STREET_RE = /\d+\s+[A-Za-z0-9.]+(?:\s+[A-Za-z0-9.]+){0,3}?\s+(?:St(?:reet)?|Ave(?:nue)?|Rd|Road|Blvd|Boulevard|Dr(?:ive)?|Ln|Lane|Way|Ct|Court|Pl(?:ace)?|Cir(?:cle)?)\b\.?/i;
  var CITY_STATE_ZIP_COMMA_RE = /\b([A-Za-z][A-Za-z\s]{1,20}),\s*([A-Za-z]{2}|[A-Za-z\s]{3,15})\s+(\d{5})(-\d{4})?\b/;

  var US_STATES = [
    ['AL', 'Alabama'], ['AK', 'Alaska'], ['AZ', 'Arizona'], ['AR', 'Arkansas'], ['CA', 'California'],
    ['CO', 'Colorado'], ['CT', 'Connecticut'], ['DE', 'Delaware'], ['FL', 'Florida'], ['GA', 'Georgia'],
    ['HI', 'Hawaii'], ['ID', 'Idaho'], ['IL', 'Illinois'], ['IN', 'Indiana'], ['IA', 'Iowa'], ['KS', 'Kansas'],
    ['KY', 'Kentucky'], ['LA', 'Louisiana'], ['ME', 'Maine'], ['MD', 'Maryland'], ['MA', 'Massachusetts'],
    ['MI', 'Michigan'], ['MN', 'Minnesota'], ['MS', 'Mississippi'], ['MO', 'Missouri'], ['MT', 'Montana'],
    ['NE', 'Nebraska'], ['NV', 'Nevada'], ['NH', 'New Hampshire'], ['NJ', 'New Jersey'], ['NM', 'New Mexico'],
    ['NY', 'New York'], ['NC', 'North Carolina'], ['ND', 'North Dakota'], ['OH', 'Ohio'], ['OK', 'Oklahoma'],
    ['OR', 'Oregon'], ['PA', 'Pennsylvania'], ['RI', 'Rhode Island'], ['SC', 'South Carolina'],
    ['SD', 'South Dakota'], ['TN', 'Tennessee'], ['TX', 'Texas'], ['UT', 'Utah'], ['VT', 'Vermont'],
    ['VA', 'Virginia'], ['WA', 'Washington'], ['WV', 'West Virginia'], ['WI', 'Wisconsin'], ['WY', 'Wyoming'],
    ['DC', 'District of Columbia']
  ];

  // Longest-first so "New York" matches before a shorter alternative could
  // steal a partial prefix. Requires a bare 5-digit number immediately after
  // the state token as an anchor — deliberately strict, since 2-letter state
  // codes (IN, OR, ME, HI, ...) double as common English words and would
  // misfire constantly without that anchor.
  var STATE_ALTERNATION = US_STATES
    .map(function (s) { return s[1]; })
    .concat(US_STATES.map(function (s) { return s[0]; }))
    .sort(function (a, b) { return b.length - a.length; })
    .join('|');

  // No comma to mark where the city name ends, so the city capture is
  // deliberately limited to exactly one word. Allowing 2+ words here would
  // let the regex reach backward past the real city into whatever text came
  // before it (e.g. a name typed with no punctuation) — safer to under-
  // capture (miss multi-word cities like "Los Angeles") than to silently
  // swallow an unrelated field.
  var CITY_STATE_ZIP_NOCOMMA_RE = new RegExp(
    '\\b([A-Za-z]+)\\s+(?:' + STATE_ALTERNATION + ')\\s+(\\d{5})(-\\d{4})?\\b', 'i'
  );

  // Last-resort: city + state with NEITHER a comma NOR a zip ("sayville ny",
  // typed as the tail of a message with nothing after it). With no zip to
  // anchor on, a 2-letter state code is just an ordinary short word most of
  // the time, so this only fires when the state token is the very last
  // thing in the message — a coincidental state-like word appearing mid-
  // sentence ("a friend, or google, not sure") won't match, only one sitting
  // at the end will. A handful of abbreviations that double as extremely
  // common English words/interjections (OH, OK, IN, OR, ME, HI, MA, PA, CO)
  // are excluded even here — "call you back ok" ending in "ok" is far more
  // likely than someone actually living in Oklahoma reporting it that way.
  var RISKY_STATE_ABBR_AS_LAST_WORD = ['OH', 'OK', 'IN', 'OR', 'ME', 'HI', 'MA', 'PA', 'CO'];
  var STATE_ALTERNATION_END = US_STATES
    .map(function (s) { return s[1]; })
    .concat(US_STATES
      .map(function (s) { return s[0]; })
      .filter(function (abbr) { return RISKY_STATE_ABBR_AS_LAST_WORD.indexOf(abbr) === -1; }))
    .sort(function (a, b) { return b.length - a.length; })
    .join('|');
  var CITY_STATE_NOCOMMA_END_RE = new RegExp(
    '\\b([A-Za-z]+)\\s+(?:' + STATE_ALTERNATION_END + ')\\s*[.,!?]*\\s*$', 'i'
  );

  var NAME_INTRO_RE = /\b(?:my name is|i'?m|i am|this is)\b/i;
  var NAME_CAPTURE_RE = /^\s+([A-Z][a-zA-Z'-]+(?:\s+[A-Z][a-zA-Z'-]+){0,2})/;
  var BUSINESS_RE = /\b(?:(?:business(?:\s+name)?|company(?:\s+name)?)\s+(?:is\s+)?(?:called\s+)?|i (?:own|run)\s+)([A-Za-z0-9&'".,()\-\[\]!\s]+?)(?=[;]|\band\b|\bmy\b|$)/i;

  function stripMatchCI(text, matched) {
    var idx = text.toLowerCase().indexOf(matched.toLowerCase());
    if (idx === -1) return text;
    return text.slice(0, idx) + ' ' + text.slice(idx + matched.length);
  }

  function detectName(text) {
    var intro = text.match(NAME_INTRO_RE);
    if (!intro) return null;
    var rest = text.slice(intro.index + intro[0].length);
    var nameCapture = rest.match(NAME_CAPTURE_RE);
    if (!nameCapture) return null;
    return { value: nameCapture[1].trim(), matched: intro[0] + nameCapture[0] };
  }

  function detectInsuranceInText(text) {
    var lower = text.toLowerCase();
    for (var i = 0; i < INSURANCE_OPTIONS.length; i++) {
      if (lower.indexOf(INSURANCE_OPTIONS[i].toLowerCase()) !== -1) {
        return { value: INSURANCE_OPTIONS[i], matched: INSURANCE_OPTIONS[i] };
      }
    }
    for (var key in INSURANCE_ALIASES) {
      if (!Object.prototype.hasOwnProperty.call(INSURANCE_ALIASES, key)) continue;
      var re = new RegExp('\\b' + key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
      var m = text.match(re);
      if (m) return { value: INSURANCE_ALIASES[key], matched: m[0] };
    }
    return null;
  }

  function extractFields(rawText) {
    var found = {};
    var remaining = rawText;

    if (!state.data.email) {
      var em = remaining.match(EMAIL_RE);
      if (em) { found.email = em[0]; remaining = stripMatchCI(remaining, em[0]); }
    }
    if (!state.data.phone) {
      var ph = remaining.match(PHONE_RE);
      if (ph) { found.phone = ph[0].trim(); remaining = stripMatchCI(remaining, ph[0]); }
    }
    if (!state.data.address) {
      var st = remaining.match(STREET_RE);
      if (st) { found.address = st[0].trim(); remaining = stripMatchCI(remaining, st[0]); }
    }
    if (!state.data.city) {
      var cz = remaining.match(CITY_STATE_ZIP_COMMA_RE) ||
        remaining.match(CITY_STATE_ZIP_NOCOMMA_RE) ||
        remaining.match(CITY_STATE_NOCOMMA_END_RE);
      if (cz) { found.city = cz[0].trim(); remaining = stripMatchCI(remaining, cz[0]); }
    }
    if (!state.data.insurance) {
      var ins = detectInsuranceInText(remaining);
      if (ins) { found.insurance = ins.value; remaining = stripMatchCI(remaining, ins.matched); }
    }
    if (!state.data.referral) {
      for (var i = 0; i < REFERRAL_KEYWORDS.length; i++) {
        var rm = remaining.match(REFERRAL_KEYWORDS[i].re);
        if (rm) { found.referral = REFERRAL_KEYWORDS[i].label; remaining = stripMatchCI(remaining, rm[0]); break; }
      }
    }
    if (!state.data.name) {
      var nm = detectName(remaining);
      if (nm) { found.name = nm.value; remaining = stripMatchCI(remaining, nm.matched); }
    }
    if (!state.data.business) {
      var bz = remaining.match(BUSINESS_RE);
      if (bz) { found.business = bz[1].trim().replace(/[,;\s]+$/, ''); remaining = stripMatchCI(remaining, bz[0]); }
    }

    return { found: found, remaining: remaining };
  }

  var state = {
    stepIndex: -1,
    data: {},
    filledCount: 0,
    completed: false,
    activePanel: 'chat'
  };

  var chatLog = document.getElementById('chatLog');
  var chatForm = document.getElementById('chatForm');
  var chatInput = document.getElementById('chatInput');
  var sendBtn = document.getElementById('sendBtn');
  var micBtn = document.getElementById('micBtn');
  var wakeBtn = document.getElementById('wakeBtn');
  var progressFill = document.getElementById('progressFill');
  var progressLabel = document.getElementById('progressLabel');
  var completionBadge = document.getElementById('completionBadge');
  var chatPanel = document.getElementById('chatPanel');
  var formPanel = document.getElementById('formPanel');
  var chatTab = document.getElementById('chatTab');
  var formTab = document.getElementById('formTab');
  var formTabBadge = document.getElementById('formTabBadge');
  var notifDot = document.getElementById('notifDot');

  var TOTAL = steps.length;

  function addBubble(text, who) {
    var b = document.createElement('div');
    b.className = 'bubble ' + who + ' enter';
    b.textContent = text;
    chatLog.appendChild(b);
    chatLog.scrollTop = chatLog.scrollHeight;
    return b;
  }

  function showTyping() {
    var t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typingIndicator';
    t.innerHTML = '<span></span><span></span><span></span>';
    chatLog.appendChild(t);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function hideTyping() {
    var t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function botSay(text, cb) {
    showTyping();
    setTimeout(function () {
      hideTyping();
      addBubble(text, 'bot');
      if (cb) cb();
    }, 650);
  }

  var MAX_FIELD_LENGTH = 200;

  function truncateValue(value) {
    if (value.length <= MAX_FIELD_LENGTH) return value;
    return value.slice(0, MAX_FIELD_LENGTH).trim() + '…';
  }

  function setFieldValue(field, value) {
    var truncated = truncateValue(value);
    var isNewFill = !Object.prototype.hasOwnProperty.call(state.data, field);
    state.data[field] = truncated;
    fillField(field, truncated, isNewFill);
    return truncated;
  }

  function fillField(field, value, isNewFill) {
    var el = document.querySelector('.form-field[data-field="' + field + '"]');
    if (!el) return;
    el.value = value;
    el.classList.add('filled', 'flash');
    setTimeout(function () { el.classList.remove('flash'); }, 650);

    if (isNewFill) {
      state.filledCount++;
      updateProgress();
    }

    if (state.activePanel === 'chat') {
      notifDot.classList.add('show');
    }
  }

  function clearField(field) {
    var el = document.querySelector('.form-field[data-field="' + field + '"]');
    if (!el) return;
    el.value = '';
    el.classList.remove('filled', 'flash');
    delete state.data[field];
    state.filledCount = Math.max(0, state.filledCount - 1);
    updateProgress();
  }

  function updateProgress() {
    var pct = Math.round((state.filledCount / TOTAL) * 100);
    progressFill.style.width = pct + '%';
    progressLabel.textContent = state.filledCount + ' of ' + TOTAL + ' fields complete';
    formTabBadge.textContent = 'Form ' + state.filledCount + '/' + TOTAL;
  }

  function advance() {
    do {
      state.stepIndex++;
    } while (state.stepIndex < TOTAL && Object.prototype.hasOwnProperty.call(state.data, steps[state.stepIndex].field));

    if (state.stepIndex >= TOTAL) {
      completeFlow();
      return;
    }
    botSay(steps[state.stepIndex].question);
  }

  function completeFlow() {
    state.completed = true;
    stopHandsFree();
    botSay("That's everything I need. Thank you for completing your intake — we'll be in touch soon.", function () {
      chatInput.disabled = true;
      sendBtn.disabled = true;
      micBtn.disabled = true;
      wakeBtn.disabled = true;
      chatInput.placeholder = 'Intake complete';
    });
    completionBadge.classList.add('show');
  }

  function handleAnswer(rawText) {
    var text = rawText.trim();
    if (!text || state.completed || state.stepIndex < 0) return;

    var currentStep = steps[state.stepIndex];
    addBubble(text, 'user');

    var extraction = extractFields(text);
    var detected = extraction.found;
    var detectedFields = Object.keys(detected);

    detectedFields.forEach(function (field) {
      if (Object.prototype.hasOwnProperty.call(state.data, field)) return;
      setFieldValue(field, detected[field]);
    });

    var extraFields = detectedFields
      .filter(function (f) { return f !== currentStep.field; })
      .sort(function (a, b) {
        return steps.map(function (s) { return s.field; }).indexOf(a) -
               steps.map(function (s) { return s.field; }).indexOf(b);
      });
    var ackMessage = extraFields.length > 0 ? buildAckMessage(extraFields) : null;

    function proceed(fn) {
      if (ackMessage) {
        botSay(ackMessage, fn);
      } else {
        fn();
      }
    }

    if (Object.prototype.hasOwnProperty.call(state.data, currentStep.field)) {
      proceed(advance);
      return;
    }

    if (detectedFields.length === 0 && isConversationalAside(text)) {
      var asideLabel = FIELD_LABELS[currentStep.field] || currentStep.field;
      botSay("Sorry about that — I don't actually have your " + asideLabel + " on file yet. Could you share it?");
      return;
    }

    if (detectedFields.length === 0 && isLikelyQuestion(text)) {
      var qLabel = FIELD_LABELS[currentStep.field] || currentStep.field;
      var why = FIELD_WHY[currentStep.field];
      botSay('Good question' + (why ? ' — that\'s ' + why : '') + '. Could you go ahead and share your ' + qLabel + '?');
      return;
    }

    if (currentStep.type === 'fuzzy-select') {
      proceed(function () { processInsuranceAnswer(text); });
      return;
    }

    var fallbackValue = detectedFields.length > 0 ? (extraction.remaining.trim() || text) : text;
    if (detectedFields.length > 0) {
      // Leftover text after stripping other fields' chunks often has stray
      // punctuation/whitespace at the seams (e.g. "anne cantera,  ,").
      fallbackValue = fallbackValue.replace(/\s+/g, ' ').replace(/^[\s,;.]+|[\s,;.]+$/g, '');
    }
    setFieldValue(currentStep.field, fallbackValue || text);
    proceed(advance);
  }

  function processInsuranceAnswer(text) {
    var result = matchInsurance(text);
    if (result.status === 'match') {
      resolveFuzzyField(result.value);
    } else if (result.status === 'ambiguous') {
      botSay('I found a few close matches — did you mean one of these?', function () {
        addChips(result.candidates.concat(['Something else']));
      });
    } else {
      botSay('I couldn\'t find that on file. Could you try the full plan name, or say "none" if you\'re self-pay?');
    }
  }

  function resolveFuzzyField(value) {
    var field = steps[state.stepIndex].field;
    setFieldValue(field, value);
    advance();
  }

  function addChips(options) {
    var row = document.createElement('div');
    row.className = 'chip-row enter';
    options.forEach(function (opt) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip';
      btn.textContent = opt;
      btn.addEventListener('click', function () {
        Array.prototype.forEach.call(row.querySelectorAll('.chip'), function (c) { c.disabled = true; });
        addBubble(opt, 'user');
        if (opt === 'Something else') {
          botSay('No problem — go ahead and type the full plan name.');
        } else {
          resolveFuzzyField(opt);
        }
      });
      row.appendChild(btn);
    });
    chatLog.appendChild(row);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  chatForm.addEventListener('submit', function (e) {
    e.preventDefault();
    var text = chatInput.value;
    chatInput.value = '';
    handleAnswer(text);
  });

  // ---------- Voice input ----------

  var SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recognition = null;
  var listening = false;
  var stopHandsFree = function () {};

  if (SpeechRecognitionCtor) {
    recognition = new SpeechRecognitionCtor();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.addEventListener('result', function (e) {
      var transcript = e.results[0][0].transcript;
      chatInput.value = transcript;
      chatInput.focus();
    });

    recognition.addEventListener('end', function () {
      listening = false;
      micBtn.classList.remove('listening');
    });

    var HARD_FAILURE_ERRORS = ['not-allowed', 'service-not-allowed', 'audio-capture'];

    function micUnavailable() {
      listening = false;
      micBtn.classList.remove('listening');
      if (micBtn.classList.contains('unsupported')) return;
      micBtn.classList.add('unsupported');
      micBtn.disabled = true;
      addBubble("Voice input isn't available here — mic access is blocked in this preview. Go ahead and type your answer instead.", 'bot');
    }

    recognition.addEventListener('error', function (e) {
      listening = false;
      micBtn.classList.remove('listening');
      if (HARD_FAILURE_ERRORS.indexOf(e.error) !== -1) {
        micUnavailable();
      }
    });

    micBtn.addEventListener('click', function () {
      if (state.completed) return;
      if (listening) {
        recognition.stop();
        return;
      }
      listening = true;
      micBtn.classList.add('listening');
      try {
        recognition.start();
      } catch (err) {
        micUnavailable();
      }
    });

    // ---------- Hands-free wake-word mode (demo) ----------
    // Approximation only: continuous listening + trigger-phrase match, no
    // dedicated wake-word engine. This means audio streams to the browser's
    // speech service the whole time hands-free mode is on, not just after
    // the wake word. Fine for a demo; call this out before shipping it.

    var WAKE_PHRASE = 'hey elementyl';
    var wakeRecognition = null;
    var handsFreeOn = false;
    var awaitingWakeAnswer = false;

    function setupWakeRecognition() {
      wakeRecognition = new SpeechRecognitionCtor();
      wakeRecognition.continuous = true;
      wakeRecognition.interimResults = false;
      wakeRecognition.lang = 'en-US';

      wakeRecognition.addEventListener('result', function (e) {
        var transcript = e.results[e.results.length - 1][0].transcript.trim();

        if (!awaitingWakeAnswer) {
          if (transcript.toLowerCase().indexOf(WAKE_PHRASE) !== -1) {
            awaitingWakeAnswer = true;
            wakeBtn.classList.add('armed');
            addBubble("I'm listening…", 'bot');
          }
          return;
        }

        awaitingWakeAnswer = false;
        wakeBtn.classList.remove('armed');
        handleAnswer(transcript);
      });

      wakeRecognition.addEventListener('end', function () {
        if (handsFreeOn && !state.completed) {
          try { wakeRecognition.start(); } catch (err) { /* already running */ }
        }
      });

      wakeRecognition.addEventListener('error', function (e) {
        if (HARD_FAILURE_ERRORS.indexOf(e.error) !== -1) {
          handsFreeOn = false;
          awaitingWakeAnswer = false;
          wakeBtn.classList.remove('active', 'armed');
          micUnavailable();
        }
      });
    }

    stopHandsFree = function () {
      handsFreeOn = false;
      awaitingWakeAnswer = false;
      wakeBtn.classList.remove('active', 'armed');
      if (wakeRecognition) {
        try { wakeRecognition.stop(); } catch (err) { /* not running */ }
      }
    };

    wakeBtn.addEventListener('click', function () {
      if (state.completed) return;
      if (!wakeRecognition) setupWakeRecognition();

      if (handsFreeOn) {
        stopHandsFree();
        return;
      }

      handsFreeOn = true;
      wakeBtn.classList.add('active');
      addBubble('Hands-free mode on — say "Hey Elementyl" any time you want to answer by voice.', 'bot');
      try {
        wakeRecognition.start();
      } catch (err) {
        handsFreeOn = false;
        wakeBtn.classList.remove('active');
        micUnavailable();
      }
    });
  } else {
    micBtn.classList.add('unsupported');
    micBtn.disabled = true;
    wakeBtn.classList.add('unsupported');
    wakeBtn.disabled = true;
  }

  // ---------- Mobile tab switching ----------

  function setActivePanel(panel) {
    state.activePanel = panel;
    if (panel === 'chat') {
      chatPanel.classList.remove('hidden');
      formPanel.classList.add('hidden');
      chatTab.classList.add('active');
      formTab.classList.remove('active');
    } else {
      chatPanel.classList.add('hidden');
      formPanel.classList.remove('hidden');
      chatTab.classList.remove('active');
      formTab.classList.add('active');
      notifDot.classList.remove('show');
    }
  }

  chatTab.addEventListener('click', function () { setActivePanel('chat'); });
  formTab.addEventListener('click', function () { setActivePanel('form'); });

  // ---------- Direct form editing ----------
  // Editing a field in the form panel is a separate, simpler path than the
  // chat flow: it never runs fuzzy-select matching or conversational-aside
  // detection (those are chat-specific — a user clicking directly into a
  // field is already unambiguous about intent). It just writes the value
  // and, if that field happens to be the one chat is currently waiting on,
  // advances the conversation so the bot doesn't ask a question that's
  // already answered.

  function findFirstUnfilledIndex() {
    for (var i = 0; i < TOTAL; i++) {
      if (!Object.prototype.hasOwnProperty.call(state.data, steps[i].field)) return i;
    }
    return TOTAL;
  }

  function reopenConversationIfNeeded(field) {
    if (!state.completed) return;
    state.completed = false;
    completionBadge.classList.remove('show');
    chatInput.disabled = false;
    sendBtn.disabled = false;
    if (!micBtn.classList.contains('unsupported')) micBtn.disabled = false;
    if (!wakeBtn.classList.contains('unsupported')) wakeBtn.disabled = false;
    chatInput.placeholder = 'Type your answer…';
    state.stepIndex = findFirstUnfilledIndex() - 1;
    botSay('Looks like your ' + (FIELD_LABELS[field] || field) + " got cleared — mind giving that again?", advance);
  }

  function handleFieldCommit(field, rawValue) {
    var value = rawValue.trim();
    var hadValue = Object.prototype.hasOwnProperty.call(state.data, field);

    if (!value) {
      if (!hadValue) return;
      clearField(field);
      reopenConversationIfNeeded(field);
      return;
    }

    if (hadValue && state.data[field] === value) return;

    var wasCurrentQuestion = !state.completed && state.stepIndex >= 0 &&
      state.stepIndex < TOTAL && steps[state.stepIndex].field === field;

    setFieldValue(field, value);

    if (wasCurrentQuestion) {
      advance();
    }
  }

  steps.forEach(function (step) {
    var el = document.querySelector('.form-field[data-field="' + step.field + '"]');
    if (!el) return;
    el.addEventListener('input', function () {
      el.classList.toggle('filled', el.value.trim().length > 0);
    });
    el.addEventListener('change', function () {
      handleFieldCommit(step.field, el.value);
    });
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        el.blur();
      }
    });
  });

  // ---------- Init ----------

  setActivePanel('chat');
  advance();

  // If the mic would otherwise be visible and clickable, but this page is
  // running inside an iframe (e.g. a shared preview link), voice almost
  // certainly won't work — the host frame typically doesn't grant
  // microphone permission, and the failure can be completely silent (no
  // error event ever fires, unlike a same-origin permission denial). Say so
  // up front instead of letting the user click mic and get nothing.
  if (SpeechRecognitionCtor && window.self !== window.top) {
    setTimeout(function () {
      botSay("Quick note: voice input (mic and hands-free) won't work while this page is embedded in a preview frame — open it directly in your own browser tab to use it.");
    }, 900);
  }

})();
</script>

</body>
</html>
